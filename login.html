<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>login page</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: arial ,sans-serif;
        }
        body{
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(135deg,#4facfe,#00f2fe);
        }
        .login-container{
            background: #fff;
            padding: 30px;
            border-radius: 10px;
            width: 350px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
        h2{
            text-align: center;
            margin-bottom: 20px;
        }
        .input-group{
            margin-bottom: 15px;
        }
        .input-group label{
            display: block;
            margin-bottom: 5px;
        }
        .input-group input{
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        .btn{
            width: 100%;
            padding: 10px;
            border: none;
            background: #4facfe;
            color: white;
            font-size: 18px;
            border-radius: 5px;
            cursor: pointer;
        }
        .btn:hover{
            background: #2f8df5;

        }
    </style>
</head>
<body>
    <div class="login-container">
        <h2>Login page</h2>
        <form action="logout.html">
            <div class="input-group">
                <label>Email</label>
                <input type="email" placeholder="enter email" required>

            </div>
            <div class="input-group">
                <label>password</label>
                <input type="password" placeholder="enter password" required>

            </div>
            <button type="button" class="btn">login</button>
        </form>
    </div>
    
</body>
</html>
