<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix Clone</title>
 <style>
    *{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#000;
    color:#fff;
}

.hero{
    position:relative;
    height:100vh;
    background:url("https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?q=80&w=1920&auto=format&fit=crop")
    center/cover no-repeat;
}

.overlay{
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.7);
}

nav{
    position:relative;
    z-index:2;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:25px 60px;
}

.logo{
    color:#e50914;
    font-size:2.5rem;
    font-weight:bold;
}

.sign-in{
    background:#e50914;
    color:white;
    border:none;
    padding:10px 18px;
    border-radius:4px;
    cursor:pointer;
    font-size:14px;
}

.content{
    position:relative;
    z-index:2;
    height:80%;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:20px;
}

.content h1{
    font-size:3.5rem;
    max-width:800px;
    margin-bottom:20px;
}

.content h3{
    font-size:1.5rem;
    margin-bottom:20px;
    font-weight:400;
}

.content p{
    margin-bottom:20px;
    font-size:1.1rem;
}

.email-box{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    justify-content:center;
}

.email-box input{
    width:350px;
    max-width:90%;
    padding:15px;
    font-size:16px;
    border:none;
    outline:none;
    border-radius:4px;
}

.email-box button{
    background:#e50914;
    color:white;
    border:none;
    padding:15px 25px;
    font-size:18px;
    border-radius:4px;
    cursor:pointer;
}

.email-box button:hover,
.sign-in:hover{
    background:#c11119;
}

@media(max-width:768px){

    nav{
        padding:20px;
    }

    .logo{
        font-size:2rem;
    }

    .content h1{
        font-size:2.2rem;
    }

    .content h3{
        font-size:1.2rem;
    }

    .email-box{
        flex-direction:column;
        width:100%;
        align-items:center;
    }

    .email-box button{
        width:350px;
        max-width:90%;
    }
}
 </style>
</head>
<body>

    <div class="hero">
        <div class="overlay"></div>

        <nav>
            <h1 class="logo">NETFLIX</h1>
            <button class="sign-in">Sign In</button>
        </nav>

        <div class="content">
            <h1>Unlimited movies, TV shows and more</h1>
            <h3>Watch anywhere. Cancel anytime.</h3>
            <p>Ready to watch? Enter your email to create or restart your membership.</p>

            <div class="email-box">
                <input type="email" placeholder="Email address">
                <button>Get Started ></button>
            </div>
        </div>
    </div>

</body>
</html>
