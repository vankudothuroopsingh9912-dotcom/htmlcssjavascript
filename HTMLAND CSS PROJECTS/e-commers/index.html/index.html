<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShopEase</title>
    <link rel="stylesheet" href="./style.css">
    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

    <!-- Navbar -->
    <header>
        <nav class="navbar">
            <div class="logo">ShopEase</div>

            <ul class="nav-links">
                <li><a href="#">Home</a></li>
                <li><a href="#">Products</a></li>
                <li><a href="#">Categories</a></li>
                <li><a href="#">Contact</a></li>
            </ul>

            <div class="icons">
                <i class="fas fa-search"></i>
                <i class="fas fa-shopping-cart cart">
                    <span id="cartCount">0</span>
                </i>
            </div>
        </nav>
    </header>

    <!-- Hero Section -->
    <section class="hero">
        <div class="hero-content">
            <h1>Discover Amazing Products</h1>
            <p>Best deals with premium quality.</p>
            <button>Shop Now</button>
        </div>
    </section>

    <!-- Products -->
    <section class="products">
        <h2>Featured Products</h2>

        <div class="product-grid">

            <div class="product-card">
                <img src="https://picsum.photos/300/250?1" alt="">
                <h3>Wireless Headphones</h3>
                <p>$59.99</p>
                <button onclick="addToCart()">Add to Cart</button>
            </div>

            <div class="product-card">
                <img src="https://picsum.photos/300/250?2" alt="">
                <h3>Smart Watch</h3>
                <p>$89.99</p>
                <button onclick="addToCart()">Add to Cart</button>
            </div>

            <div class="product-card">
                <img src="https://picsum.photos/300/250?3" alt="">
                <h3>Gaming Mouse</h3>
                <p>$39.99</p>
                <button onclick="addToCart()">Add to Cart</button>
            </div>

            <div class="product-card">
                <img src="https://picsum.photos/300/250?4" alt="">
                <h3>Bluetooth Speaker</h3>
                <p>$49.99</p>
                <button onclick="addToCart()">Add to Cart</button>
            </div>

        </div>
    </section>

    <script src="./script.js"></script>
</body>
</html>
