<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notes App</title>
 <style>
    body {
  font-family: Arial, sans-serif;
  background: #f4f6f8;
  margin: 0;
  display: flex;
  justify-content: center;
}

.container {
  width: 400px;
  margin-top: 40px;
  text-align: center;
}

h1 {
  color: #333;
}

textarea {
  width: 100%;
  height: 100px;
  padding: 10px;
  margin-bottom: 10px;
  border-radius: 8px;
  border: 1px solid #ccc;
}

button {
  padding: 10px 15px;
  border: none;
  background: #007bff;
  color: white;
  border-radius: 5px;
  cursor: pointer;
}

button:hover {
  background: #0056b3;
}

.note {
  background: white;
  padding: 10px;
  margin-top: 10px;
  border-radius: 8px;
  box-shadow: 0 0 5px rgba(0,0,0,0.1);
  text-align: left;
  position: relative;
}

.delete {
  position: absolute;
  right: 10px;
  top: 10px;
  background: red;
  color: white;
  border: none;
  border-radius: 5px;
  cursor: pointer;
}
 </style>
</head>
<body>

  <div class="container">
    <h1>📝 My Notes</h1>

    <textarea id="noteInput" placeholder="Write your note..."></textarea>
    <button onclick="addNote()">Add Note</button>

    <div id="notesContainer"></div>
  </div>

  <script>
let notes = JSON.parse(localStorage.getItem("notes")) || [];

const notesContainer = document.getElementById("notesContainer");

function displayNotes() {
  notesContainer.innerHTML = "";

  notes.forEach((note, index) => {
    const div = document.createElement("div");
    div.classList.add("note");

    div.innerHTML = `
      ${note}
      <button class="delete" onclick="deleteNote(${index})">X</button>
    `;

    notesContainer.appendChild(div);
  });
}

function addNote() {
  const input = document.getElementById("noteInput");
  const text = input.value.trim();

  if (text === "") return;

  notes.push(text);
  localStorage.setItem("notes", JSON.stringify(notes));

  input.value = "";
  displayNotes();
}

function deleteNote(index) {
  notes.splice(index, 1);
  localStorage.setItem("notes", JSON.stringify(notes));
  displayNotes();
}

// Load notes on start
displayNotes();
  </script>
</body>
</html>
