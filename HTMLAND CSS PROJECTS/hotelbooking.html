<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luxury Hotel Booking</title>
   <style>
    *{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f5f5f5;
}

/* Navbar */
header{
    background:#0d1b2a;
    padding:15px 50px;
}

nav{
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.logo{
    color:white;
    font-size:28px;
    font-weight:bold;
}

nav ul{
    list-style:none;
    display:flex;
}

nav ul li{
    margin-left:20px;
}

nav ul li a{
    color:white;
    text-decoration:none;
    font-size:16px;
}

nav ul li a:hover{
    color:#fca311;
}

/* Hero */
.hero{
    height:90vh;
    background:url('https://images.unsplash.com/photo-1566073771259-6a8506099945?w=1200')
    center/cover no-repeat;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
}

.hero-content{
    background:rgba(0,0,0,0.5);
    padding:40px;
    border-radius:10px;
    color:white;
}

.hero-content h1{
    font-size:50px;
}

.hero-content p{
    margin:15px 0;
    font-size:20px;
}

.btn{
    display:inline-block;
    padding:12px 25px;
    background:#fca311;
    color:white;
    text-decoration:none;
    border-radius:5px;
}

/* Booking Form */
.booking{
    padding:60px 20px;
    text-align:center;
}

.booking h2{
    margin-bottom:20px;
}

.booking form{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:15px;
}

.booking input,
.booking select,
.booking button{
    padding:12px;
    width:220px;
    border:1px solid #ccc;
    border-radius:5px;
}

.booking button{
    background:#14213d;
    color:white;
    cursor:pointer;
}

.booking button:hover{
    background:#fca311;
}

/* Rooms */
.rooms{
    padding:60px 20px;
    text-align:center;
}

.room-container{
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:25px;
    margin-top:30px;
}

.room-card{
    background:white;
    width:300px;
    border-radius:10px;
    overflow:hidden;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.room-card img{
    width:100%;
}

.room-card h3,
.room-card p{
    padding:10px;
}

/* Footer */
footer{
    background:#0d1b2a;
    color:white;
    text-align:center;
    padding:20px;
    margin-top:40px;
}

/* Responsive */
@media(max-width:768px){
    nav{
        flex-direction:column;
    }

    nav ul{
        margin-top:10px;
    }

    .hero-content h1{
        font-size:35px;
    }

    .booking form{
        flex-direction:column;
        align-items:center;
    }
}
   </style>
</head>
<body>

    <!-- Header -->
    <header>
        <nav>
            <div class="logo">HotelLux</div>
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#">Rooms</a></li>
                <li><a href="#">Services</a></li>
                <li><a href="#">Contact</a></li>
            </ul>
        </nav>
    </header>

    <!-- Hero Section -->
    <section class="hero">
        <div class="hero-content">
            <h1>Book Your Dream Stay</h1>
            <p>Luxury rooms at affordable prices.</p>
            <a href="#" class="btn">Explore Rooms</a>
        </div>
    </section>

    <!-- Booking Form -->
    <section class="booking">
        <h2>Reserve Your Room</h2>
        <form>
            <input type="text" placeholder="Full Name" required>
            <input type="date" required>
            <input type="date" required>
            <select>
                <option>1 Guest</option>
                <option>2 Guests</option>
                <option>3 Guests</option>
                <option>4 Guests</option>
            </select>
            <button type="submit">Book Now</button>
        </form>
    </section>

    <!-- Rooms Section -->
    <section class="rooms">
        <h2>Featured Rooms</h2>

        <div class="room-container">
            <div class="room-card">
                <img src="https://via.placeholder.com/300x200" alt="Room">
                <h3>Deluxe Room</h3>
                <p>$120 / Night</p>
            </div>

            <div class="room-card">
                <img src="https://via.placeholder.com/300x200" alt="Room">
                <h3>Executive Suite</h3>
                <p>$180 / Night</p>
            </div>

            <div class="room-card">
                <img src="https://via.placeholder.com/300x200" alt="Room">
                <h3>Luxury Suite</h3>
                <p>$250 / Night</p>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer>
        <p>&copy; 2026 HotelLux. All Rights Reserved.</p>
    </footer>

</body>
</html>
