<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Generator</title>
<style>
    body {
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #667eea, #764ba2);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    margin: 0;
}

.container {
    background: white;
    padding: 25px;
    border-radius: 15px;
    width: 350px;
    text-align: center;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

h1 {
    margin-bottom: 20px;
}

.output {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
}

.output input {
    flex: 1;
    padding: 10px;
    font-size: 16px;
}

button {
    padding: 10px;
    border: none;
    cursor: pointer;
    background: #6c63ff;
    color: white;
    border-radius: 5px;
}

button:hover {
    background: #574fd6;
}

.controls {
    text-align: left;
}

input[type="range"] {
    width: 100%;
}

.options {
    margin: 10px 0;
    display: flex;
    flex-direction: column;
    gap: 5px;
}

.generate {
    width: 100%;
    margin-top: 10px;
}
</style>
</head>
<body>

<div class="container">
    <h1>Password Generator</h1>

    <div class="output">
        <input type="text" id="password" readonly>
        <button onclick="copyPassword()">Copy</button>
    </div>

    <div class="controls">
        <label>Password Length: <span id="lengthValue">12</span></label>
        <input type="range" id="length" min="4" max="32" value="12" oninput="updateLength()">

        <div class="options">
            <label><input type="checkbox" id="uppercase" checked> Uppercase</label>
            <label><input type="checkbox" id="lowercase" checked> Lowercase</label>
            <label><input type="checkbox" id="numbers" checked> Numbers</label>
            <label><input type="checkbox" id="symbols"> Symbols</label>
        </div>

        <button class="generate" onclick="generatePassword()">Generate Password</button>
    </div>
</div>

<script>
function updateLength() {
    document.getElementById("lengthValue").innerText =
        document.getElementById("length").value;
}

function generatePassword() {
    const length = document.getElementById("length").value;
    const includeUpper = document.getElementById("uppercase").checked;
    const includeLower = document.getElementById("lowercase").checked;
    const includeNumbers = document.getElementById("numbers").checked;
    const includeSymbols = document.getElementById("symbols").checked;

    const upper = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
    const lower = "abcdefghijklmnopqrstuvwxyz";
    const numbers = "0123456789";
    const symbols = "!@#$%^&*()_+[]{}|;:,.<>?";

    let chars = "";

    if (includeUpper) chars += upper;
    if (includeLower) chars += lower;
    if (includeNumbers) chars += numbers;
    if (includeSymbols) chars += symbols;

    if (!chars) {
        alert("Please select at least one option!");
        return;
    }

    let password = "";
    for (let i = 0; i < length; i++) {
        const randomIndex = Math.floor(Math.random() * chars.length);
        password += chars[randomIndex];
    }

    document.getElementById("password").value = password;
}

function copyPassword() {
    const passwordField = document.getElementById("password");
    passwordField.select();
    document.execCommand("copy");
    alert("Password copied!");
}
</script>
</body>
</html>
