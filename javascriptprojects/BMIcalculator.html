<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>BMI Calculator</title>
<style>
    body {
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #74ebd5, #acb6e5);
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  margin: 0;
}

.container {
  background: white;
  padding: 25px;
  border-radius: 12px;
  width: 300px;
  text-align: center;
  box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

input {
  width: 100%;
  padding: 10px;
  margin: 8px 0;
  border: 1px solid #ccc;
  border-radius: 6px;
}

button {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
  background: #28a745;
  color: white;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  font-size: 16px;
}

button:hover {
  background: #218838;
}

h2 {
  margin-top: 15px;
}
</style>
</head>
<body>

  <div class="container">
    <h1>BMI Calculator</h1>

    <label>Weight (kg)</label>
    <input type="number" id="weight" placeholder="Enter weight">

    <label>Height (cm)</label>
    <input type="number" id="height" placeholder="Enter height">

    <button onclick="calculateBMI()">Calculate BMI</button>

    <h2 id="result"></h2>
    <p id="status"></p>
  </div>

  <script>
function calculateBMI() {
  const weight = parseFloat(document.getElementById("weight").value);
  const height = parseFloat(document.getElementById("height").value);
  const result = document.getElementById("result");
  const status = document.getElementById("status");

  if (!weight || !height) {
    result.innerText = "Please enter valid values!";
    status.innerText = "";
    return;
  }

  // convert height from cm to meters
  const heightInMeters = height / 100;

  const bmi = weight / (heightInMeters * heightInMeters);
  const bmiFixed = bmi.toFixed(2);

  result.innerText = `Your BMI: ${bmiFixed}`;

  if (bmi < 18.5) {
    status.innerText = "Status: Underweight";
  } else if (bmi < 24.9) {
    status.innerText = "Status: Normal weight";
  } else if (bmi < 29.9) {
    status.innerText = "Status: Overweight";
  } else {
    status.innerText = "Status: Obese";
  }
}
  </script>
</body>
</html>
