<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration Form</title>
    <style>
*{
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: arial,sans-serif;
}
body{
    background-color: #f4f4f4;
    display:flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}
.container{
    width: 400px;
    background: #fff;
    padding: 25px;
    border-radius: 10px;
    box-shadow: 0 0 10px rgba(0,0,0,0.2);
}
h2{
    text-align: center;
    margin-bottom: 20px;
    color: #333;
}
.form-group{
    margin-bottom: 20px;
}
label{
    display: block;
    margin-bottom: 5px;
    font-weight: bold;
    color: #555;
}
input,select,textarea{
    width: 100%;
    padding: 10px;
    border: 1px solid #ccc;
    font-size: 14px;
}
textarea{
    resize: none;
    height: 80px;
}
.gender{
    display:flex;
    gap:15px;
    margin-top: 5px;
}
.gender input{
    width: auto;
}
button{
    width: 100%;
    padding: 12px;
    background: #007BFF;
    border:none;
    color:white;
    font-size: 16px;
    border-radius: 5px;
    cursor: pointer;
}
button:hover{
    background: #0056B3;
}
 </style>
</head>
<body>
    <div class="container">
        <h1>Student Registration Form</h1>
        <form>
        <div class="form-group">
            <label for="Name">FullName:</label>
            <input type="text" placeholder="Name" required>
        </div>
         <div class="form-group">
             <label for="email">Email:</label>
            <input type="email"  placeholder="enter emaiil" required>
        </div>
        <div class="form-group">
            <label>PhoneNumber</label>
            <input type="tel"  placeholder="enter phone number">
        </div>
        <div class="form-group">
            <label> DateOfBirth:</label>
            <input type="date">
        </div>
        <div class="form-group">
            <label>Gender</label>
            <div class="gender">
            <label><input type="radio" name="gender">Male</label>
            <label><input type="radio" name="gender">FeMale</label>
            </div>
           </div>
        <div class="form-group">
            <label>Course</label>
            <select>
                <option>select Coures</option>
                <option>BCA</option>
                  <option>BBA</option>
                    <option>B.TECH</option>
                      <option>MCA</option>
            </select>
        </div>
        <Div class="form-group">
            <label>Address</label>
            <textarea placeholder="enter your address"> </textarea>
        </Div>
<button type="submit">Register</button>
        </form>
        </div>
</body>
</html>
